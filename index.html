<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podrži Jovanu Jocku</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #ff4757;
            color: white;
            padding: 30px 10px;
        }
        header h1 {
            margin: 0;
        }
        .profile {
            margin: 20px auto;
            max-width: 400px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
            padding: 20px;
        }
        .profile img {
            width: 100%;
            max-width: 300px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .donation {
            margin: 20px auto;
            max-width: 400px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
        }
        input[type="number"], button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #ff6b81;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff4757;
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h1>Podrži Jovanu Jocku 🎤</h1>
    <p>Pomozite joj da stvori još jače hitove i radi na muzici 24/7!</p>
</header>

<div class="profile">
    <!-- Online slika kao zamena za 'joka.jpg' -->
    <img src="https://i.ibb.co/3yrx1KX/joka.jpg" alt="Jovana Jocka">
    <h2>Jovana Jocka</h2>
    <p>Pevacica, rad na muzici i novi hitovi.</p>
</div>

<div class="donation">
    <h2>Doniraj sada</h2>
    <input type="number" id="iznos" placeholder="Iznos donacije u din" min="1">
    <button onclick="prikaziUputstvo()">Pošalji donaciju</button>
    <p id="uputstvo"></p>
</div>

<footer>
    &copy; 2026 Jovana Jocka – Donacije dostupne 24/7
</footer>

<script>
function prikaziUputstvo() {
    const iznos = parseInt(document.getElementById("iznos").value);
    if (!iznos || iznos <= 0) {
        alert("Unesi validan iznos donacije!");
        return;
    }
    const uputstvo = `
        Hvala na donaciji od ${iznos} dinara<br>
        Uplata na žiro račun:<br>
        <strong>170001092289800050</strong><br>
        Primaoc: <strong>Jovana Jocka</strong><br>
        Svrha: <strong>Donacija za muziku i hitove</strong><br>
        Nakon uplate, vaša podrška ide direktno za rad na muzici! Hvala.
    `;
    document.getElementById("uputstvo").innerHTML = uputstvo;
}
</script>

</body>
</html>
